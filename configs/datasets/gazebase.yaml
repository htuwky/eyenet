dataset:
  dataset_id: GazeBase
  name: GazeBase
  root: data/raw/GazeBase
  processed_dir: data/processed/GazeBase
  local_status: available_extracted_subject_zips
  primary_role: self_supervised_pretraining

labels:
  has_clinical_label: false
  supervised_task: identity_or_session_auxiliary_only
  use_for_sz_binary: false

stimulus:
  task_type: multiple_eye_movement_tasks
  stimulus_type: mixed_task
  sampling_rate_hz: 1000
  screen_width_px: 1680
  screen_height_px: 1050
  screen_diagonal_in: null
  screen_width_cm: 47.4
  screen_height_cm: 29.7
  viewing_distance_cm: 55
  content_visible_to_model: false

features:
  use_pupil: false
  normalize_xy: true
  compute_dva: if_metadata_available
  content_features_used: false

pretraining:
  usable: true
  recommended_tasks: [masked_event_modeling, segment_contrastive_learning, device_robust_encoder]

schema:
  event_table: data/processed/GazeBase/gazebase_fixation_events.csv
  adapter: raw_dva_gaze_to_fixation_events
  default_tasks: [VD1, VD2]
