experiment:
  name: ems_event_temporal_fixed_split
  dataset_config: configs/datasets/ems.yaml
  output_dir: experiments/ems_fixed_split/event_temporal_sequence
  random_seed: 42

data:
  events: data/processed/EMS/ems_event_temporal_sequences_no_pupil.csv
  split: data/splits/EMS/ems_subject_split_60_20_20_seed42.csv

model:
  stream: event_temporal_stream
  projection_dim: 64
  hidden_dim: 64
  attention_dim: 64
  dropout: 0.3
  max_events: null

training:
  batch_size: 8
  max_epochs: 100
  patience: 15
  learning_rate: 0.001
  weight_decay: 0.0001
  pos_weight: 1.0
  gradient_clip_norm: 5.0

evaluation:
  split_protocol: subject_level_60_20_20
  threshold_selection: validation_best_balanced_accuracy
  test_policy: evaluate_once_after_validation_selection
